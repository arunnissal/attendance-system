{% extends 'base.html' %}

{% block title %}Login - Smart Attendance{% endblock %}

{% block content %}
<div class="login-container glass-card" style="max-width: 400px; width: 100%; padding: 2.5rem; margin: auto;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h2 style="color: var(--primary-dark); margin-bottom: 0.5rem;">Welcome Back</h2>
        <p style="color: #666;">Sign in to your account</p>
    </div>

    <form method="post">
        {% csrf_token %}
        
        {% if form.errors %}
            <div class="message error" style="margin-bottom: 1rem;">
                Invalid username or password. Please try again.
            </div>
        {% endif %}

        <div class="form-group">
            <label for="{{ form.username.id_for_label }}">Username</label>
            <input type="text" name="{{ form.username.html_name }}" id="{{ form.username.id_for_label }}" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="{{ form.password.id_for_label }}">Password</label>
            <input type="password" name="{{ form.password.html_name }}" id="{{ form.password.id_for_label }}" class="form-control" required>
        </div>

        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem; padding: 0.8rem;">Login</button>
    </form>
</div>
{% endblock %}
